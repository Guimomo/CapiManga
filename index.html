<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"></meta>
    <link rel="stylesheet" href="CSS/styles.css">
    <title>CapiManga</title>
</head>
<body>
    
    
    <!-- SECCIÓN DEL HEADER Y SLIDER------------------------------------>
    <div class="header-slider">
        
        <header class="header">

            <div class="header-content">

                <a href="" class="div--logo">
                    <img class="logo--image" src="ASSETS/img/page_elements/logo/logo.png" alt="">
                </a>

            </div>
            
        </header>
        
        <div class="slider">

            <div class="list">
                
                <a href="#" class="slide-item">
                    <img src="../ASSETS/img/slider_items/1.stone_ocean/imgItem.png" alt="Sailor Moon" class="slide-image">
                    <div class="slide-info">
                        <img src="../ASSETS/img/slider_items/1.stone_ocean/logo.png" alt="Sailor Moon Logo" class="slide-logo">
                        <h2 class="slide-title">JoJo's Bizarre Adventure: Stone Ocean</h2>

                        <div class="genres">

                            <p class="slide-genre accion">Acción</p>
                            <p class="slide-subgenre subAventura">Aventura</p>
                            
                        </div>
                    </div>
                </a>
        
                <a href="#" class="slide-item">
                    <img src="ASSETS/img/slider_items/2.dragon_ball/imgItem.jpeg" alt="Dragon Ball" class="slide-image">
                    <div class="slide-info">
                        <img src="ASSETS/img/slider_items/2.dragon_ball/logo.png" alt="Dragon Ball Logo" class="slide-logo">
                        <h2 class="slide-title">Dragon Ball</h2>

                        <div class="genres">
                            
                            <p class="slide-genre accion">Acción</p>
                            <p class="slide-subgenre subAventura">Aventura</p>

                        </div>
                    </div>
                </a>
        
                <a href="#" class="slide-item">
                    <img src="ASSETS/img/slider_items/3.sailor_moon/imgItem.jpg" alt="JoJo's Bizarre Adventure: Stone Ocean" class="slide-image">
                    <div class="slide-info">
                        <img src="ASSETS/img/slider_items/3.sailor_moon/logo.png" alt="JoJo Logo" class="slide-logo">
                        <h2 class="slide-title">Sailor Moon</h2>

                        <div class="genres">
                            
                            <p class="slide-genre chicasMagicas">Chicas Mágicas</p>
                            <p class="slide-subgenre subFantasia">Fantasía</p>

                        </div>
                    </div>
                </a>

            </div>
            

            <div class="thumbnail">
    
                <div class="item">
                    <img src="ASSETS/img/slider_items/2.dragon_ball/imgItem.jpeg" alt="Dragon Ball">
                </div>
                <div class="item">
                    <img src="ASSETS/img/slider_items/3.sailor_moon/imgItem.jpg" alt="Sailor Moon">
                </div>
                <div class="item active">
                    <img src="ASSETS/img/slider_items/1.stone_ocean/imgItem.png" alt="JoJo's Bizarre Adventure: Stone Ocean">
                </div>
            </div>

            <div class="arrows">

                <button id="prev"> < </button>
                <button id="next"> > </button>
                
            </div>
        </div>
        
        <script src="JS/transition.js"></script>

    </div>

    <!-- SECCIÓN DE CONTENIDO-------------------------------------------->
    <div class="content">

    </div>

    <!-- FOOTER---------------------------------------------------------->
    <div class="footer">

    </div>
    
</body>
</html>
